<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — Habib Shop</title>
  <style>
    body { background:#111; color:#fff; font-family:Arial, sans-serif; margin:0; padding:20px }
    h1{ text-align:center }
    .items{max-width:720px;margin:16px auto;display:flex;flex-direction:column;gap:12px}
    .item{background:#1b1b1b;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
    .muted{color:#cfcfcf}
    .actions{max-width:720px;margin:18px auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .btn{background:orange;color:#000;padding:10px 14px;border-radius:8px;border:0;cursor:pointer}
    .link{color:orange;text-decoration:none}
    .small{font-size:13px;color:#cfcfcf}
  </style>
</head>
<body>

  <h1>Your Cart</h1>

  <div class="items" id="cartItems"></div>

  <div class="actions">
    <div class="muted" id="summary">Subtotal: Rs 0 • Delivery: Rs 350</div>
    <div>
      <button class="btn" id="clearBtn">Clear Cart</button>
      <a class="btn" id="checkoutBtn" href="checkout.html">Proceed to Checkout</a>
    </div>
  </div>

<script>
(function(){
  // Try both keys for compatibility: prefer the main app key 'habib_cart' if present
  const KEYS = ['habib_cart','cart'];
  const DELIVERY = 350;

  let cart = [];
  for (const k of KEYS) {
    const data = localStorage.getItem(k);
    if (data) { try { cart = JSON.parse(data); break; } catch(e){ /*ignore*/ } }
  }

  // Ensure cart is an array
  if (!Array.isArray(cart)) cart = [];

  const container = document.getElementById('cartItems');
  const summary = document.getElementById('summary');
  const clearBtn = document.getElementById('clearBtn');

  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function saveCart(){
    // Save back to the first available key (or 'cart' by default)
    const saveKey = KEYS.find(k => localStorage.getItem(k) !== null) || KEYS[1];
    localStorage.setItem(saveKey, JSON.stringify(cart));
  }

  function render(){
    container.innerHTML = '';
    if(!cart || cart.length === 0){
      container.innerHTML = '<p style="text-align:center;color:#cfcfcf">Your cart is empty.</p>';
      summary.textContent = `Subtotal: Rs 0 • Delivery: Rs ${DELIVERY}`;
      return;
    }

    let subtotal = 0;
    cart.forEach((item, idx) => {
      const qty = item.qty && item.qty > 0 ? item.qty : 1;
      const lineTotal = (Number(item.price) || 0) * qty;
      subtotal += lineTotal;

      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div>
          <div style="font-weight:600">${escapeHtml(item.name || 'Unnamed')}</div>
          <div class="small">Rs ${escapeHtml(String(item.price || 0))} ${qty ? '× '+qty : ''}</div>
        </div>
        <div>
          <button data-idx="${idx}" class="remove" style="background:transparent;border:1px solid #444;color:#fff;padding:6px 8px;border-radius:6px;cursor:pointer">Remove</button>
        </div>`;
      container.appendChild(div);
    });

    const total = subtotal + DELIVERY;
    summary.textContent = `Subtotal: Rs ${subtotal} • Delivery: Rs ${DELIVERY} • Total: Rs ${total}`;

    // remove handlers
    container.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', e => {
        const i = +e.currentTarget.dataset.idx;
        cart.splice(i,1);
        saveCart();
        render();
      });
    });
  }

  clearBtn.addEventListener('click', ()=>{
    if(confirm('Clear all items from cart?')){
      cart = [];
      // remove both keys for cleanliness
      KEYS.forEach(k => localStorage.removeItem(k));
      render();
    }
  });

  render();
})();
</script>

</body>
</html>
