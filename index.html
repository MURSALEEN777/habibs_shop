<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habib Bhai Achar Waley</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    background: black;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('your-banner.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* TITLE */
h1 {
    color: orange;
    font-size: 70px;
    text-align: center;
    opacity: 0;
    transform: translateY(-50px);
    animation: fadeDown 1.5s ease forwards;
}

@keyframes fadeDown {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TAGLINE */
p {
    color: white;
    font-size: 20px;
    margin-top: 20px;
    opacity: 0;
    animation: fadeUp 2s ease forwards;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* BUTTON */
.btn {
    margin-top: 40px;
    padding: 15px 40px;
    border: none;
    background: orange;
    color: black;
    font-size: 18px;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.4s;
    opacity: 0;
    animation: fadeUp 2.5s ease forwards;
}

.btn:hover {
    background: white;
    transform: scale(1.1);
}

/* FLOATING SPICES EFFECT */
.spice {
    position: absolute;
    width: 10px;
    height: 10px;
    background: orange;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0% {transform: translateY(0);} 
    50% {transform: translateY(-100px);} 
    100% {transform: translateY(0);} 
}

</style>
</head>

<body>

<div class="hero">
    <h1>Habib Bhai Achar Waley</h1>
    <p>Tradition in Every Bite Since 1965</p>
    
    <button class="btn" onclick="enterSite()">Enter Website</button>
</div>

<script>

// REDIRECT
function enterSite() {
    window.location.href = "index.html"; // navigates to the shop (index.html)
}

// FLOATING DOTS
for (let i = 0; i < 30; i++) {
    let dot = document.createElement("div");
    dot.classList.add("spice");
    
    dot.style.left = Math.random() * 100 + "vw";
    dot.style.top = Math.random() * 100 + "vh";
    dot.style.animationDuration = (3 + Math.random() * 5) + "s";
    
    document.body.appendChild(dot);
}

</script>

</body>
</html>
