<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<style>
body { 
    margin: 0;
    font-family: Arial; 
    background:#111; 
    color:white;
}

/* NAVIGATION */
nav {
    background: #222;
    padding: 15px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 20px;
    font-size: 16px;
    transition: 0.3s;
}

nav a:hover {
    color: orange;
}

.products {
    display: flex;
    gap: 20px;
    padding: 40px;
}

.card {
    background:#222;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

button {
    background: orange;
    border:none;
    padding:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
  <a href="cart.html">Cart</a>
  <a href="checkout.html">Checkout</a>
  <a href="brand.html">Brand</a>
</nav>

<h1 style="text-align:center;">Our Products</h1>

<div class="products">

<div class="card">
    <h2>Mango Achar</h2>
    <p>Rs 500</p>
    <button onclick="addToCart('Mango Achar',500)">Add to Cart</button>
</div>

<div class="card">
    <h2>Lemon Achar</h2>
    <p>Rs 400</p>
    <button onclick="addToCart('Lemon Achar',400)">Add to Cart</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price){
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}
</script>

</body>
</html>
